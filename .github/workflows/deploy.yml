name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build for GitHub Pages
        run: npm run build:prod
        env:
          NODE_ENV: production
          GITHUB_PAGES: true
          GITHUB_REPOSITORY: ${{ github.repository }}
      
      - name: Create artifact structure
        run: |
          # Crear la estructura correcta para GitHub Pages
          mkdir -p public-artifact/travel-album-frontend
          cp -r out/* public-artifact/travel-album-frontend/
          
          # Crear archivo de redirección en la raíz
          echo '<!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=/travel-album-frontend/">
          </head>
          <body>
            <p>Redirigiendo a <a href="/travel-album-frontend/">/travel-album-frontend/</a>...</p>
          </body>
          </html>' > public-artifact/index.html
          
          # Crear .nojekyll en ambas carpetas
          touch public-artifact/.nojekyll
          touch public-artifact/travel-album-frontend/.nojekyll
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public-artifact'
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4